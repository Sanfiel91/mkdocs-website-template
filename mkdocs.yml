INHERIT: mkdocs.base.yml

site_name: Andrés Espinosa Sanfiel
site_url: https://sanfieldai.com
site_description: >-
  AI Engineer helping teams ship production agentic AI systems, RAG pipelines,
  and AI APIs. Based in Spain and available remotely across Europe.
docs_dir: docs

theme:
  language: en

nav:
  - Home: index.md
  - About: about.md
  - Portfolio:
      - Overview: portfolio/index.md
      - Case Studies:
          - AI-Powered Email Automation System: portfolio/projects/agentic-email-automation.md
          - Hybrid Search RAG Pipeline: portfolio/projects/rag-hybrid-search-pipeline.md
          - Production AI API Platform: portfolio/projects/enterprise-ai-products.md
  - Blog: blog/index.md
  - Topics: tags.md

extra:
  alternate:
    - name: English
      link: /
      lang: en
    - name: Español
      link: /es/
      lang: es
  consent:
    title: Cookie consent
    description: >-
      We use privacy-friendly analytics to understand which pages and contact
      paths generate qualified conversations. You can change this choice at any
      time.
    actions:
      - accept
      - manage
      - reject
    cookies:
      analytics:
        name: Google Analytics
        checked: true

copyright: >-
  Copyright &copy; 2026 Andrés Espinosa Sanfiel -
  <a href="#__consent">Cookie settings</a>
