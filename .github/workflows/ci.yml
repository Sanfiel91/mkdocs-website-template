name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches: [sanfiel-site]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: true
      GOOGLE_ANALYTICS_ID: ${{ secrets.GOOGLE_ANALYTICS_ID }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libfreetype6-dev libffi-dev libjpeg-dev libpng-dev zlib1g-dev pngquant

      - name: Sync Python dependencies
        run: uv sync --frozen

      - name: Check shared EN/ES assets stay in sync
        run: |
          for pair in \
            "docs/stylesheets/extra.css docs_es/stylesheets/extra.css" \
            "docs/stylesheets/hero.css docs_es/stylesheets/hero.css" \
            "docs/javascripts/extra.js docs_es/javascripts/extra.js"
          do
            set -- $pair
            if ! cmp -s "$1" "$2"; then
              echo "::error file=$1::Expected $1 and $2 to stay identical"
              diff -u "$1" "$2" || true
              exit 1
            fi
          done

      - name: Build English site
        run: uv run mkdocs build --strict -f mkdocs.yml --site-dir site

      - name: Clear optimize cache before ES build
        run: rm -rf tmp/mkdocs-optimize-cache

      - name: Build Spanish site
        run: uv run mkdocs build --strict -f mkdocs.es.yml --site-dir site/es

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
